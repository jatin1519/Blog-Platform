version: "3"

services:

 backend:
   build: ./backend
   depends_on:
    - mongo

 frontend:
  build: ./frontend

 
 mongo:
  image: mongo
  volumes:
   - mongo-data:/data/db
 

 nginx:
  image: nginx
  ports:
   - "80:80"
  volumes:
   - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  depends_on:
  - backend
  - frontend

volumes:
  mongo-data:
